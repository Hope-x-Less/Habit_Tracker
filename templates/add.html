<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Habit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <header class="page-header">
            <h1>Add Habit</h1>
            <a class="button secondary" href="{{ url_for('home') }}">Back</a>
        </header>

        <form class="habit-form" action="{{ url_for('add_habit') }}" method="post">
            <label for="name">Habit Name</label>
            <input id="name" name="name" type="text" required>

            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" placeholder="Optional"></textarea>

            <button type="submit" class="button">Save Habit</button>
        </form>
    </main>
</body>
</html>
